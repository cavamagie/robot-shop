# ============================================================
# CVE-2021-44228 — Log4Shell
# Immagine: Apache Solr 8.11.0 (usa log4j 2.14.1, non patchata)
# Severity: CRITICAL (CVSS 10.0)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log4shell-solr
  namespace: vuln-test
  labels:
    app: log4shell-solr
    cve: "CVE-2021-44228"
    severity: critical
    component: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log4shell-solr
  template:
    metadata:
      labels:
        app: log4shell-solr
        cve: "CVE-2021-44228"
        severity: critical
    spec:
      containers:
        - name: solr
          # log4j 2.14.1 — vulnerabile a Log4Shell
          image: solr:8.11.0
          ports:
            - containerPort: 8983
          env:
            - name: SOLR_HEAP
              value: "512m"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          # Nessun securityContext → ulteriore segnale per scanner
          readinessProbe:
            httpGet:
              path: /solr/admin/info/system
              port: 8983
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: log4shell-solr-svc
  namespace: vuln-test
  labels:
    cve: "CVE-2021-44228"
spec:
  selector:
    app: log4shell-solr
  ports:
    - port: 8983
      targetPort: 8983
  type: ClusterIP
