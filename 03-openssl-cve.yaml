# ============================================================
# OpenSSL vulnerabilità note — immagine nginx con OpenSSL datato
#
# CVE-2022-0778  — infinite loop in BN_mod_sqrt() (DoS) — CVSS 7.5
# CVE-2022-1292  — c_rehash shell injection               — CVSS 9.8
# CVE-2021-3449  — NULL ptr deref via renegotiation       — CVSS 7.4
#
# Immagine: nginx:1.20.2 → OpenSSL 1.1.1l (non patchata per i CVE sopra)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openssl-vuln-nginx
  namespace: vuln-test
  labels:
    app: openssl-vuln-nginx
    cve: "CVE-2022-0778,CVE-2022-1292,CVE-2021-3449"
    severity: high
    component: tls-library
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openssl-vuln-nginx
  template:
    metadata:
      labels:
        app: openssl-vuln-nginx
        cve: "CVE-2022-0778"
        severity: high
    spec:
      containers:
        - name: nginx
          # nginx 1.20.2 linkato a OpenSSL 1.1.1l — non patchata
          image: nginx:1.20.2
          ports:
            - containerPort: 80
            - containerPort: 443
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-vuln-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-vuln-config
  namespace: vuln-test
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: openssl-vuln-nginx-svc
  namespace: vuln-test
  labels:
    cve: "CVE-2022-0778"
spec:
  selector:
    app: openssl-vuln-nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
